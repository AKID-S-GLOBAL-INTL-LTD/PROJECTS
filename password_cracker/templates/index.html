<!DOCTYPE html>
<html>
<head>
    <title>Password Cracking Toolkit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-warning">⚠️ Ethical Use Only</div>
    <h2>🔓 Password Cracking Toolkit</h2>
    <div class="card">
        <div class="card-body">
            <div class="mb-3">
                <label>Target Hash</label>
                <input type="text" id="hash" class="form-control" placeholder="e.g., 5f4dcc3b5aa765d61d8327deb882cf99">
                <small id="hashType" class="text-muted"></small>
            </div>
            <div class="mb-3">
                <label>Hash Type (auto-detected, but you can override)</label>
                <select id="hashTypeSelect" class="form-select">
                    <option value="auto">Auto-detect</option>
                    <option value="MD5">MD5</option>
                    <option value="SHA1">SHA1</option>
                    <option value="SHA256">SHA256</option>
                    <option value="SHA512">SHA512</option>
                    <option value="NTLM">NTLM</option>
                    <option value="bcrypt">bcrypt</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Wordlist (optional, max 2GB)</label>
                <input type="file" id="wordlistFile" class="form-control">
                <small>Leave empty to use built-in small list.</small>
            </div>
            <button id="crackBtn" class="btn btn-danger">Start Cracking</button>
        </div>
    </div>
    <div id="results" class="mt-4" style="display:none;">
        <h4>Results</h4>
        <div class="progress mb-3">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
        </div>
        <pre id="resultText" class="bg-dark text-white p-3 rounded"></pre>
    </div>
</div>
<script>
    const hashInput = document.getElementById('hash');
    const autoTypeSpan = document.getElementById('hashType');
    const hashTypeSelect = document.getElementById('hashTypeSelect');
    const crackBtn = document.getElementById('crackBtn');
    const resultsDiv = document.getElementById('results');
    const resultText = document.getElementById('resultText');
    const progressBar = document.getElementById('progressBar');
    let jobId = null;
    let pollInterval = null;

    // Auto-detect and show in UI, but user can override
    let debounce;
    hashInput.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
            const hash = hashInput.value.trim();
            if (hash.length < 5) {
                autoTypeSpan.innerText = '';
                return;
            }
            fetch('/identify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({hash: hash})
            })
            .then(r => r.json())
            .then(data => {
                autoTypeSpan.innerText = `Auto-detected: ${data.type.toUpperCase()}`;
                // Optionally set the dropdown to the detected type (but don't force)
            });
        }, 400);
    });

    crackBtn.addEventListener('click', async () => {
        const hash = hashInput.value.trim();
        if (!hash) {
            alert('Enter a hash');
            return;
        }
        const formData = new FormData();
        formData.append('hash', hash);
        formData.append('hash_type', hashTypeSelect.value);
        const wordlistFile = document.getElementById('wordlistFile').files[0];
        if (wordlistFile) formData.append('wordlist', wordlistFile);
        
        crackBtn.disabled = true;
        crackBtn.innerText = 'Starting...';
        resultsDiv.style.display = 'block';
        resultText.innerText = 'Starting cracking job...';
        progressBar.style.width = '0%';
        
        try {
            const response = await fetch('/crack', { method: 'POST', body: formData });
            const data = await response.json();
            if (data.error) {
                resultText.innerText = `Error: ${data.error}`;
                crackBtn.disabled = false;
                crackBtn.innerText = 'Start Cracking';
                return;
            }
            jobId = data.job_id;
            resultText.innerText = `Cracking in progress (${data.hash_type})...`;
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollProgress, 2000);
        } catch (err) {
            resultText.innerText = `Error: ${err.message}`;
            crackBtn.disabled = false;
            crackBtn.innerText = 'Start Cracking';
        }
    });

    async function pollProgress() {
        if (!jobId) return;
        try {
            const res = await fetch(`/progress/${jobId}`);
            const data = await res.json();
            if (data.status === 'running') {
                resultText.innerText = `Cracking... Attempts: ${data.attempts.toLocaleString()}`;
                progressBar.style.width = '50%';
            } else if (data.status === 'done') {
                clearInterval(pollInterval);
                crackBtn.disabled = false;
                crackBtn.innerText = 'Start Cracking';
                let output = `Hash Type: ${data.hash_type}\n`;
                output += `Attempts: ${data.attempts.toLocaleString()}\n`;
                output += `Time: ${data.time_seconds} seconds\n`;
                output += `Speed: ${data.attempts_per_sec.toLocaleString()} attempts/sec\n`;
                if (data.found) {
                    output += `✅ PASSWORD FOUND: ${data.password}\n`;
                    progressBar.style.width = '100%';
                    progressBar.className = 'progress-bar bg-success';
                } else {
                    output += `❌ Password not found in wordlist.\n`;
                    progressBar.style.width = '100%';
                    progressBar.className = 'progress-bar bg-danger';
                }
                resultText.innerText = output;
                jobId = null;
            }
        } catch (err) {
            console.error(err);
        }
    }
</script>
</body>
</html>
