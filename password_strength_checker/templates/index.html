<!DOCTYPE html>
<html>
<head>
    <title>Password Strength & Breach Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>🔐 Password Strength & Breach Checker</h2>
        <p>Type a password – it never leaves your browser (except for anonymous breach lookup via HIBP).</p>
        <div class="card">
            <div class="card-body">
                <input type="password" id="password" class="form-control form-control-lg" placeholder="Enter password">
                <div id="results" style="display: none;" class="mt-3">
                    <div class="progress mb-3">
                        <div id="strength-bar" class="progress-bar" role="progressbar"></div>
                    </div>
                    <p><strong>Score:</strong> <span id="score">0</span>/4</p>
                    <p><strong>Entropy:</strong> <span id="entropy">0</span> bits</p>
                    <p><strong>Crack time:</strong> <span id="crack_time">0</span></p>
                    <p><strong>Breaches:</strong> <span id="breaches">0</span></p>
                    <div id="suggestions" class="alert alert-info"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const pw = document.getElementById('password');
        const results = document.getElementById('results');
        const bar = document.getElementById('strength-bar');
        const scoreSpan = document.getElementById('score');
        const entropySpan = document.getElementById('entropy');
        const crackSpan = document.getElementById('crack_time');
        const breachesSpan = document.getElementById('breaches');
        const suggestionsDiv = document.getElementById('suggestions');
        let timer;
        pw.addEventListener('input', () => {
            clearTimeout(timer);
            const val = pw.value;
            if (!val) { results.style.display = 'none'; return; }
            timer = setTimeout(() => {
                fetch('/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: val})
                })
                .then(r => r.json())
                .then(d => {
                    results.style.display = 'block';
                    scoreSpan.innerText = d.score;
                    entropySpan.innerText = d.entropy;
                    let ct = d.crack_time_seconds;
                    if (ct > 1e8) crackSpan.innerText = (ct/1e8).toFixed(1)+' centuries';
                    else if (ct > 3.1536e7) crackSpan.innerText = (ct/3.1536e7).toFixed(1)+' years';
                    else if (ct > 86400) crackSpan.innerText = (ct/86400).toFixed(1)+' days';
                    else if (ct > 3600) crackSpan.innerText = (ct/3600).toFixed(1)+' hours';
                    else if (ct > 60) crackSpan.innerText = (ct/60).toFixed(1)+' minutes';
                    else crackSpan.innerText = ct.toFixed(1)+' seconds';
                    if (d.breaches === -1) breachesSpan.innerText = 'API error';
                    else if (d.breaches > 0) breachesSpan.innerText = d.breaches + ' (BREACHED!)';
                    else breachesSpan.innerText = '0 (safe)';
                    if (d.suggestions.length) {
                        suggestionsDiv.innerHTML = '<strong>Suggestions:</strong><ul>' + d.suggestions.map(s=>`<li>${s}</li>`).join('') + '</ul>';
                    } else {
                        suggestionsDiv.innerHTML = '✅ Strong password!';
                    }
                    let percent = (d.score/4)*100;
                    bar.style.width = percent+'%';
                    bar.className = 'progress-bar ' + (percent<25?'bg-danger':percent<50?'bg-warning':percent<75?'bg-info':'bg-success');
                });
            }, 500);
        });
    </script>
</body>
</html>
