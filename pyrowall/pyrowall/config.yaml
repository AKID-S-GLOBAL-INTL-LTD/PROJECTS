app:
  host: "127.0.0.1"
  port: 5000
  debug: false
  secret_key: "pyrowall-change-this-in-production"

engine:
  interface: "auto"       # auto-detect, or specify e.g. eth0, wlan0, Ethernet
  log_allowed: true
  log_blocked: true
  max_log_entries: 50000  # auto-purge oldest beyond this

database:
  path: "db/pyrowall.db"
