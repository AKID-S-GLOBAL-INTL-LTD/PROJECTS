{% extends "base.html" %}
{% block content %}
<h2>Encrypt or Decrypt a File</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Encrypt</div>
            <div class="card-body">
                <form method="post" action="/encrypt" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label>Select file</label>
                        <input type="file" name="file" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Algorithm</label>
                        <select name="algorithm" class="form-select">
                            <option value="aes">AES-256-GCM (recommended)</option>
                            <option value="chacha">ChaCha20-Poly1305</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Encrypt & Download</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">Decrypt</div>
            <div class="card-body">
                <form method="post" action="/decrypt" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label>Select .enc file</label>
                        <input type="file" name="file" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Decrypt & Download</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
