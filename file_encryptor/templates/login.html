{% extends "base.html" %}
{% block content %}
<style>
    .auth-wrap {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 0;
    }

    .auth-panel {
        width: 100%;
        max-width: 440px;
    }

    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-logo .icon-ring {
        width: 68px; height: 68px;
        border: 2px solid var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        margin: 0 auto 1rem;
        background: var(--accent-dim);
        box-shadow: 0 0 30px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05);
        animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
        0%, 100% { box-shadow: 0 0 30px rgba(0,212,255,0.2), inset 0 0 20px rgba(0,212,255,0.05); }
        50% { box-shadow: 0 0 50px rgba(0,212,255,0.4), inset 0 0 30px rgba(0,212,255,0.1); }
    }

    .auth-logo h2 {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        font-size: 1.5rem;
        color: #fff;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin: 0;
    }

    .auth-logo p {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.72rem;
        color: var(--text-muted);
        letter-spacing: 0.2em;
        margin-top: 0.3rem;
    }

    .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
    }

    .auth-card-header {
        background: rgba(0,212,255,0.07);
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.6rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
    }

    .auth-card-header span {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.75rem;
        color: var(--text-muted);
        letter-spacing: 0.12em;
    }

    .auth-card-header .tag {
        background: rgba(0,212,255,0.12);
        border: 1px solid var(--border);
        color: var(--accent);
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.7rem;
        padding: 0.15rem 0.5rem;
        border-radius: 3px;
        letter-spacing: 0.08em;
    }

    .auth-card-body { padding: 2rem; }

    .field-group { margin-bottom: 1.4rem; }

    .field-group label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.72rem;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 0.45rem;
        display: block;
    }

    .auth-footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 1.6rem;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .btn-auth-submit {
        background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.08)) !important;
        border: 1px solid var(--accent) !important;
        color: var(--accent) !important;
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 0.6rem 1.8rem;
        border-radius: 5px;
        transition: all 0.25s;
        cursor: pointer;
    }

    .btn-auth-submit:hover {
        background: linear-gradient(135deg, rgba(0,212,255,0.35), rgba(0,212,255,0.15)) !important;
        box-shadow: 0 0 20px rgba(0,212,255,0.3);
        transform: translateY(-1px);
    }

    .secure-note {
        text-align: center;
        margin-top: 1.5rem;
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.68rem;
        color: var(--text-muted);
        letter-spacing: 0.1em;
    }
</style>

<div class="auth-wrap">
    <div class="auth-panel">
        <div class="auth-logo">
            <div class="icon-ring">🔑</div>
            <h2>Access Portal</h2>
            <p>// AUTHENTICATE TO CONTINUE</p>
        </div>

        <div class="auth-card">
            <div class="auth-card-header">
                <span>SESSION</span>
                <div class="tag">SECURE LOGIN</div>
            </div>
            <div class="auth-card-body">
                <form method="post">
                    <div class="field-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="field-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••••" required>
                    </div>
                    <div class="auth-footer-row">
                        <button type="submit" class="btn btn-auth-submit">→ Login</button>
                        <a href="{{ url_for('auth.register') }}" class="btn btn-link">Create Account</a>
                    </div>
                </form>
            </div>
        </div>

        <p class="secure-note">🛡 All sessions are encrypted and monitored</p>
    </div>
</div>
{% endblock %}
